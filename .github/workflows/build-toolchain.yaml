name: Build ToolChain

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-toolchain
          make_latest: true

  libc-12:
    needs: init-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download
        run: |
          mkdir -p artifacts
          curl -SL -o artifacts/amd64-gnu-12.3.tar.bz2 https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--glibc--stable-2023.08-1.tar.bz2
          curl -SL -o artifacts/arm64-gnu-12.3.tar.bz2 https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--glibc--stable-2023.08-1.tar.bz2
          curl -SL -o artifacts/arm-gnu-12.3.tar.bz2 https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--glibc--stable-2023.08-1.tar.bz2
          curl -SL -o artifacts/amd64-musl-12.3.tar.bz2 https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--musl--stable-2023.08-1.tar.bz2
          curl -SL -o artifacts/arm64-musl-12.3.tar.bz2 https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--musl--stable-2023.08-1.tar.bz2
          curl -SL -o artifacts/arm-musl-12.3.tar.bz2 https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--musl--stable-2023.08-1.tar.bz2
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-toolchain
          files: artifacts/*
      - name: Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Buildx
        uses: docker/setup-buildx-action@v3
      - name: Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build-toolchain/Dockerfile
          push: true
          tags: dpanel/builder:libc-12

  libc-13:
    needs: init-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download
        run: |
          mkdir -p artifacts
          curl -SL -o artifacts/amd64-gnu-13.2.tar.bz2 https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--glibc--bleeding-edge-2023.11-1.tar.bz2
          curl -SL -o artifacts/arm64-gnu-13.2.tar.bz2 https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--glibc--bleeding-edge-2023.11-1.tar.bz2
          curl -SL -o artifacts/arm-gnu-13.2.tar.bz2 https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--glibc--bleeding-edge-2023.11-1.tar.bz2
          curl -SL -o artifacts/amd64-musl-13.2.tar.bz2 https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--musl--bleeding-edge-2023.11-1.tar.bz2
          curl -SL -o artifacts/arm64-musl-13.2.tar.bz2 https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--musl--bleeding-edge-2023.11-1.tar.bz2
          curl -SL -o artifacts/arm-musl-13.2.tar.bz2 https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--musl--bleeding-edge-2023.11-1.tar.bz2
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-toolchain
          files: artifacts/*
      - name: Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Buildx
        uses: docker/setup-buildx-action@v3
      - name: Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build-toolchain/Dockerfile
          push: true
          tags: dpanel/builder:libc-13

  synology:
    needs: init-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download
        run: |
          mkdir -p artifacts
          curl -SL -o artifacts/arm64-synology-7.1.txz https://global.synologydownload.com/download/ToolChain/toolchain/7.1-42661/Realtek%20RTD129x%20Linux%204.4.180/rtd1296-gcc850_glibc226_armv8-GPL.txz 
          curl -SL -o artifacts/amd64-synology-7.1.txz https://global.synologydownload.com/download/ToolChain/toolchain/7.1-42661/Intel%20x86%20Linux%204.4.180%20%28GeminiLake%29/geminilake-gcc850_glibc226_x86_64-GPL.txz
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-toolchain
          files: artifacts/*
      - name: Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Buildx
        uses: docker/setup-buildx-action@v3
      - name: Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build-toolchain/Dockerfile
          push: true
          tags: dpanel/builder:synology

  tool:
    needs: init-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download
        run: |
          mkdir -p artifacts
          curl -sSL -o artifacts/amd64-linux-fnpack https://static2.fnnas.com/fnpack/fnpack-1.2.0-linux-amd64
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-toolchain
          files: artifacts/*
      - name: Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Buildx
        uses: docker/setup-buildx-action@v3
      - name: Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build-toolchain/Dockerfile
          push: true
          tags: dpanel/builder:tool