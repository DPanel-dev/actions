name: Build and Push ToolChain

on:
  workflow_dispatch:

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [libc12, libc13, synology]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Aliyun
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile-${{ matrix.target }}
          push: true
          tags: |
            dpanel/builder:${{ matrix.target }}
            registry.cn-hangzhou.aliyuncs.com/dpanel/builder:${{ matrix.target }}

  release-tools:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Tools
        run: |
          mkdir -p artifacts
          # Docker Windows
          LATEST_ZIP=$(curl -sS https://download.docker.com/win/static/stable/x86_64/ | grep -oE 'docker-[0-9.]+\.zip' | tail -n 1)
          curl -sSL "https://download.docker.com/win/static/stable/x86_64/$LATEST_ZIP" -o docker.zip
          unzip -q docker.zip && mv docker/docker.exe artifacts/amd64-windows-docker.exe
          
          # Docker Compose Windows
          URL=$(curl -sS https://api.github.com/repos/docker/compose/releases/latest | jq -r '.assets[] | select(.name == "docker-compose-windows-x86_64.exe") | .browser_download_url')
          curl -sSL -o "artifacts/amd64-windows-docker-compose.exe" "$URL"
          
          # fnpack
          curl -sSL -o artifacts/amd64-linux-fnpack https://static2.fnnas.com/fnpack/fnpack-1.2.0-linux-amd64
          chmod +x artifacts/amd64-linux-fnpack

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-toolchain
          files: artifacts/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}