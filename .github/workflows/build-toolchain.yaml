name: Build and Push ToolChain

on:
  workflow_dispatch:

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Musl 12.3 ---
          - { name: "amd64-musl-12.3", url: "https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--musl--stable-2023.08-1.tar.bz2" }
          - { name: "arm64-musl-12.3", url: "https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--musl--stable-2023.08-1.tar.bz2" }
          - { name: "arm-musl-12.3",   url: "https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--musl--stable-2023.08-1.tar.bz2" }
          
          # --- Musl 13.2 ---
          - { name: "amd64-musl-13.2", url: "https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--musl--bleeding-edge-2023.11-1.tar.bz2" }
          - { name: "arm64-musl-13.2", url: "https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--musl--bleeding-edge-2023.11-1.tar.bz2" }
          - { name: "arm-musl-13.2",   url: "https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--musl--bleeding-edge-2023.11-1.tar.bz2" }
          
          # --- GNU 12.3 ---
          - { name: "amd64-gnu-12.3",  url: "https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--glibc--stable-2023.08-1.tar.bz2" }
          - { name: "arm64-gnu-12.3",  url: "https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--glibc--stable-2023.08-1.tar.bz2" }
          - { name: "arm-gnu-12.3",    url: "https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--glibc--stable-2023.08-1.tar.bz2" }
          
          # --- GNU 13.2 ---
          - { name: "amd64-gnu-13.2",  url: "https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--glibc--bleeding-edge-2023.11-1.tar.bz2" }
          - { name: "arm64-gnu-13.2",  url: "https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--glibc--bleeding-edge-2023.11-1.tar.bz2" }
          - { name: "arm-gnu-13.2",    url: "https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--glibc--bleeding-edge-2023.11-1.tar.bz2" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Aliyun
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build-toolchain/Dockerfile-libc
          push: true
          build-args: |
            DOWNLOAD_URL=${{ matrix.url }}
            TARGET_DIR=${{ matrix.name }}
          tags: |
            dpanel/builder:${{ matrix.name }}
            registry.cn-hangzhou.aliyuncs.com/dpanel/builder:${{ matrix.name }}

  release-synology:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - { 
              name: "amd64-synology.txz", 
              url: "https://global.synologydownload.com/download/ToolChain/toolchain/7.1-42661/Intel%20x86%20Linux%204.4.180%20%28GeminiLake%29/geminilake-gcc850_glibc226_x86_64-GPL.txz" 
            }
          - { 
              name: "armv8-synology.txz", 
              url: "https://global.synologydownload.com/download/ToolChain/toolchain/7.1-42661/Realtek%20RTD129x%20Linux%204.4.180/rtd1296-gcc850_glibc226_armv8-GPL.txz" 
            }
    steps:
      - name: Download and Rename Toolchain
        run: |
          curl -SL "${{ matrix.url }}" -o "${{ matrix.name }}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-toolchain
          files: ${{ matrix.name }}
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-tools:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Tools
        run: |
          mkdir -p artifacts
          # Docker Windows
          LATEST_ZIP=$(curl -sS https://download.docker.com/win/static/stable/x86_64/ | grep -oE 'docker-[0-9.]+\.zip' | tail -n 1)
          curl -sSL "https://download.docker.com/win/static/stable/x86_64/$LATEST_ZIP" -o docker.zip
          unzip -q docker.zip && mv docker/docker.exe artifacts/amd64-windows-docker.exe
          
          # Docker Compose Windows
          URL=$(curl -sS https://api.github.com/repos/docker/compose/releases/latest | jq -r '.assets[] | select(.name == "docker-compose-windows-x86_64.exe") | .browser_download_url')
          curl -sSL -o "artifacts/amd64-windows-docker-compose.exe" "$URL"
          
          # fnpack
          curl -sSL -o artifacts/amd64-linux-fnpack https://static2.fnnas.com/fnpack/fnpack-1.2.0-linux-amd64
          chmod +x artifacts/amd64-linux-fnpack

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-toolchain
          files: artifacts/*
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}